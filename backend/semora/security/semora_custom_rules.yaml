# semora_custom_rules.yaml
#
# Custom Semgrep rule pack for Semora — extends the p/python default ruleset.
#
# These three rules target patterns that p/python either misses entirely or
# only catches in framework-specific contexts (e.g. Django ORM), ensuring
# they fire on plain Python regardless of the web framework in use.
#
# Rule authorship: Semora Security Agent
# Schema version: semgrep >=1.0

rules:

  # ---------------------------------------------------------------------------
  # Rule 1 — Hardcoded Secret / API Key
  #
  # STRIDE: I — Information Disclosure
  # Severity: CRITICAL
  #
  # Rationale: p/python's hardcoded-password rules look for specific argument
  # names (e.g. `password=`) in function calls.  They do not reliably catch
  # module-level or local assignments like `API_KEY = "sk-..."`.  This rule
  # fills that gap by matching any variable whose name suggests it holds a
  # credential and that is assigned a non-trivial string literal.
  # ---------------------------------------------------------------------------
  - id: semora.python.hardcoded-secret
    patterns:
      # Match: VARIABLE = "any string literal"
      - pattern: $VAR = "..."
      # Only trigger when the variable name looks like a secret holder.
      - metavariable-regex:
          metavariable: $VAR
          regex: >-
            (?ix)(
              api_key | api_secret | secret | secret_key |
              password | passwd | pwd |
              token | auth_token | access_token | refresh_token |
              private_key | client_secret | db_password |
              access_key | encryption_key
            )
    message: >
      Hardcoded secret detected: '$VAR' is assigned a string literal value.
      Secrets must never be hardcoded in source code.
      Load them from environment variables: os.getenv("$VAR") or via python-dotenv.
    languages: [python]
    severity: ERROR
    metadata:
      semora-stride: "I — Information Disclosure"
      semora-severity: "CRITICAL"
      cwe: "CWE-798"

  # ---------------------------------------------------------------------------
  # Rule 2 — Weak / Predictable Token Generation
  #
  # STRIDE: S — Spoofing
  # Severity: HIGH
  #
  # Rationale: Python's `random` module uses a Mersenne Twister PRNG, which
  # is NOT cryptographically secure.  Values generated by `random.*` are
  # predictable given enough output samples.  When such values are used as
  # session IDs, CSRF tokens, or one-time passwords, an attacker can predict
  # or brute-force them to forge a valid credential and spoof a legitimate
  # user.  The standard library's `secrets` module exists precisely for this.
  # ---------------------------------------------------------------------------
  - id: semora.python.weak-token-generation
    patterns:
      # Match: VARIABLE = random.FUNCTION(...)
      - pattern: $VAR = random.$FUNC(...)
      # Only trigger when the variable name is security-sensitive.
      - metavariable-regex:
          metavariable: $VAR
          regex: >-
            (?ix)(
              token | secret | key | session | session_id |
              password | nonce | csrf | otp | auth | api_key
            )
      # Only trigger when the random function is one of the weak generators.
      - metavariable-regex:
          metavariable: $FUNC
          regex: "^(random|randint|randrange|choice|choices|sample|uniform|gauss)$"
    message: >
      Weak token generation: '$VAR' is assigned using 'random.$FUNC()', which
      is NOT cryptographically secure.  Use 'secrets.token_hex(32)' or
      'secrets.token_urlsafe(32)' for security-sensitive random values.
    languages: [python]
    severity: ERROR
    metadata:
      semora-stride: "S — Spoofing"
      semora-severity: "HIGH"
      cwe: "CWE-338"

  # ---------------------------------------------------------------------------
  # Rule 3 — SQL Injection via F-String / String Concatenation
  #
  # STRIDE: T — Tampering
  # Severity: CRITICAL
  #
  # Rationale: p/python includes formatted-sql-query rules but they are
  # primarily scoped to ORM / DB-API call sites (cursor.execute(...)).  This
  # rule catches the earlier pattern where a query string is *constructed*
  # using f-string interpolation and stored in a variable whose name suggests
  # it is a SQL query — before it ever reaches a cursor.  Belt-and-suspenders
  # alongside p/python's built-in rules.
  # ---------------------------------------------------------------------------
  - id: semora.python.sql-injection
    patterns:
      # Match: QUERY_VAR = f"...{ANY_VAR}..."
      - pattern: $QUERY = f"...{$VAR}..."
      # Only trigger when the variable name looks like a SQL query holder.
      - metavariable-regex:
          metavariable: $QUERY
          regex: >-
            (?ix)(
              query | sql | stmt | statement |
              cmd | command | raw_query | db_query | sql_query
            )
    message: >
      SQL injection risk: '$QUERY' is built using f-string interpolation of
      '$VAR'.  Never interpolate user-supplied values into SQL strings.
      Use parameterised queries instead:
      cursor.execute("SELECT * FROM users WHERE id = %s", (user_id,))
    languages: [python]
    severity: ERROR
    metadata:
      semora-stride: "T — Tampering"
      semora-severity: "CRITICAL"
      cwe: "CWE-89"
